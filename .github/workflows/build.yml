name: Build and Release

on:
  push:
    tags:
      - 'v*'

env:
  NODE_VERSION: "22.17.0"
  OPENCLAW_VERSION: "latest"

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Import Code Signing Certificate
        env:
          CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          echo "$CERTIFICATE_BASE64" | base64 --decode > $RUNNER_TEMP/certificate.p12
          security import $RUNNER_TEMP/certificate.p12 -P "$CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"

          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

      - name: Prepare runtime (x64)
        run: node scripts/download-openclaw.js
        env:
          TARGET_ARCH: x64

      - name: Build macOS (x64)
        run: node scripts/patch-osx-sign-emfile.js && ulimit -n 65536 && npx vite build && npx electron-builder --mac --x64 --publish never
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Prepare runtime (ARM64)
        run: node scripts/download-openclaw.js
        env:
          TARGET_ARCH: arm64

      - name: Build macOS (ARM64)
        run: node scripts/patch-osx-sign-emfile.js && ulimit -n 65536 && npx vite build && npx electron-builder --mac --arm64 --publish never
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac-build
          path: |
            release/*.dmg
            release/*.zip
            release/latest-mac.yml

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Prepare runtime
        run: node scripts/download-openclaw.js
        env:
          TARGET_ARCH: x64

      - name: Build Windows
        run: npx vite build && npx electron-builder --win --x64 --publish never

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: |
            release/*.exe
            release/*.blockmap
            release/latest.yml

  release:
    needs: [build-mac, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.zip
            artifacts/**/*.exe
            artifacts/**/*.blockmap
            artifacts/**/latest*.yml
          generate_release_notes: true
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 上传到阿里云 OSS（国内加速下载）
      - name: Setup aliyun ossutil
        uses: manyuanrong/setup-ossutil@v3.0
        with:
          endpoint: ${{ secrets.OSS_ENDPOINT }}
          access-key-id: ${{ secrets.OSS_ACCESS_KEY_ID }}
          access-key-secret: ${{ secrets.OSS_ACCESS_KEY_SECRET }}

      - name: Flatten artifacts
        run: |
          mkdir -p upload
          find artifacts/ -type f \( \
            -name "*.exe" -o -name "*.blockmap" -o -name "*.dmg" -o \
            -name "*.zip" -o -name "latest*.yml" \
          \) -exec cp {} upload/ \;
          echo "Files to upload:"
          ls -lh upload/

      - name: Upload to Aliyun OSS
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          # 上传到 /releases/clawbox/<version>/ 目录
          ossutil cp -rf upload/ oss://${{ secrets.OSS_BUCKET }}/releases/clawbox/${VERSION}/
          # 同时复制到 /releases/clawbox/latest/ 供自动更新使用
          ossutil cp -rf upload/ oss://${{ secrets.OSS_BUCKET }}/releases/clawbox/latest/
