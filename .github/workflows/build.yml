name: Build and Release

on:
  push:
    tags:
      - 'v*'

env:
  NODE_VERSION: "22.17.0"
  OPENCLAW_VERSION: "latest"

jobs:
  build-mac-x64:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Import Code Signing Certificate
        env:
          CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          echo "$CERTIFICATE_BASE64" | base64 --decode > $RUNNER_TEMP/certificate.p12
          security import $RUNNER_TEMP/certificate.p12 -P "$CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"

          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

      - name: Prepare runtime
        run: node scripts/download-openclaw.js
        env:
          TARGET_ARCH: x64

      - name: Smoke test (runtime + gateway + API)
        run: node scripts/smoke-test.js
        env:
          TARGET_ARCH: x64
          TEST_API_KEY: ${{ secrets.TEST_API_KEY }}
          TEST_API_BASE_URL: ${{ secrets.TEST_API_BASE_URL }}
          TEST_API_MODEL: ${{ secrets.TEST_API_MODEL }}

      - name: Build macOS (x64)
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          node scripts/patch-osx-sign-emfile.js
          ulimit -n 65536
          npx vite build
          for attempt in 1 2 3; do
            echo "Build attempt $attempt..."
            if npx electron-builder --mac --x64 --publish never; then
              echo "Build succeeded on attempt $attempt"
              break
            fi
            if [ $attempt -eq 3 ]; then
              echo "Build failed after 3 attempts"
              exit 1
            fi
            echo "Build failed, cleaning up and retrying in 30s..."
            rm -rf release/mac* release/*.dmg release/*.zip
            sleep 30
          done

      - name: Upload macOS x64 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac-x64-build
          path: |
            release/*.dmg
            release/*.zip
            release/latest-mac.yml

  build-mac-arm64:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Import Code Signing Certificate
        env:
          CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          echo "$CERTIFICATE_BASE64" | base64 --decode > $RUNNER_TEMP/certificate.p12
          security import $RUNNER_TEMP/certificate.p12 -P "$CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"

          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

      - name: Prepare runtime
        run: node scripts/download-openclaw.js
        env:
          TARGET_ARCH: arm64

      - name: Smoke test (runtime + gateway + API)
        run: node scripts/smoke-test.js
        env:
          TARGET_ARCH: arm64
          TEST_API_KEY: ${{ secrets.TEST_API_KEY }}
          TEST_API_BASE_URL: ${{ secrets.TEST_API_BASE_URL }}
          TEST_API_MODEL: ${{ secrets.TEST_API_MODEL }}

      - name: Build macOS (ARM64)
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          node scripts/patch-osx-sign-emfile.js
          ulimit -n 65536
          npx vite build
          for attempt in 1 2 3; do
            echo "Build attempt $attempt..."
            if npx electron-builder --mac --arm64 --publish never; then
              echo "Build succeeded on attempt $attempt"
              break
            fi
            if [ $attempt -eq 3 ]; then
              echo "Build failed after 3 attempts"
              exit 1
            fi
            echo "Build failed, cleaning up and retrying in 30s..."
            rm -rf release/mac* release/*.dmg release/*.zip
            sleep 30
          done

      - name: Upload macOS ARM64 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac-arm64-build
          path: |
            release/*.dmg
            release/*.zip
            release/latest-mac.yml

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Prepare runtime
        run: node scripts/download-openclaw.js
        env:
          TARGET_ARCH: x64

      - name: Smoke test (runtime + gateway + API)
        run: node scripts/smoke-test.js
        env:
          TARGET_ARCH: x64
          TEST_API_KEY: ${{ secrets.TEST_API_KEY }}
          TEST_API_BASE_URL: ${{ secrets.TEST_API_BASE_URL }}
          TEST_API_MODEL: ${{ secrets.TEST_API_MODEL }}

      - name: Build Windows
        run: npx vite build && npx electron-builder --win --x64 --publish never

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: |
            release/*.exe
            release/*.blockmap
            release/latest.yml

  release:
    needs: [build-mac-x64, build-mac-arm64, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Merge latest-mac.yml
        run: |
          # 两个 mac job 各自生成的 latest-mac.yml 只含自己架构的文件条目
          # 需要合并为一个包含 x64 + arm64 的完整文件
          X64_YML="artifacts/mac-x64-build/latest-mac.yml"
          ARM64_YML="artifacts/mac-arm64-build/latest-mac.yml"

          if [ -f "$X64_YML" ] && [ -f "$ARM64_YML" ]; then
            # 从 arm64 yml 中提取 files 条目（跳过 version/path/sha512/releaseDate 等顶层字段）
            ARM64_FILES=$(awk '/^files:/{found=1; next} found && /^  - /{print; next} found && /^    /{print; next} found{exit}' "$ARM64_YML")

            # 将 arm64 文件条目追加到 x64 yml 的 files 列表末尾（在 path: 行之前）
            awk -v arm64="$ARM64_FILES" '
              /^path:/ { print arm64 }
              { print }
            ' "$X64_YML" > artifacts/latest-mac.yml

            # 保留合并后的文件，删除两份原始文件避免上传冲突
            rm -f "$X64_YML" "$ARM64_YML"

            echo "Merged latest-mac.yml:"
            cat artifacts/latest-mac.yml
          else
            echo "Warning: One or both latest-mac.yml files not found, skipping merge"
          fi

      - name: Flatten artifacts
        run: |
          mkdir -p upload
          find artifacts/ -type f \( \
            -name "*.exe" -o -name "*.blockmap" -o -name "*.dmg" -o \
            -name "*.zip" -o -name "latest*.yml" \
          \) -exec cp -n {} upload/ \;
          echo "Files to upload:"
          ls -lh upload/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: upload/*
          generate_release_notes: true
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 上传到阿里云 OSS（国内加速下载）
      - name: Setup aliyun ossutil
        uses: manyuanrong/setup-ossutil@v3.0
        with:
          endpoint: ${{ secrets.OSS_ENDPOINT }}
          access-key-id: ${{ secrets.OSS_ACCESS_KEY_ID }}
          access-key-secret: ${{ secrets.OSS_ACCESS_KEY_SECRET }}

      - name: Generate download links file
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          VERSION_NUM=${VERSION#v}
          OSS_BASE="https://${{ secrets.OSS_BUCKET }}.oss-cn-shanghai.aliyuncs.com/releases/clawbox"
          GITHUB_BASE="https://github.com/ooAKLoo/ClawBox/releases/download/${VERSION}"
          GITHUB_RELEASE="https://github.com/ooAKLoo/ClawBox/releases/tag/${VERSION}"

          cat > upload/download.md << EOF
          # ClawBox ${VERSION} 下载链接

          ---

          ## 🇨🇳 中国用户（国内高速下载）

          **Windows:** ${OSS_BASE}/latest/ClawBox%20Setup%20${VERSION_NUM}.exe
          **macOS (Apple Silicon):** ${OSS_BASE}/latest/ClawBox-${VERSION_NUM}-arm64.dmg
          **macOS (Intel):** ${OSS_BASE}/latest/ClawBox-${VERSION_NUM}.dmg

          ---

          ## 🌍 International Users (GitHub Download)

          **Windows:** ${GITHUB_BASE}/ClawBox%20Setup%20${VERSION_NUM}.exe
          **macOS (Apple Silicon):** ${GITHUB_BASE}/ClawBox-${VERSION_NUM}-arm64.dmg
          **macOS (Intel):** ${GITHUB_BASE}/ClawBox-${VERSION_NUM}.dmg

          ---

          **GitHub Release:** ${GITHUB_RELEASE}
          **版本 / Version:** ${VERSION}
          EOF

          sed -i 's/^          //' upload/download.md
          echo "Generated download.md:"
          cat upload/download.md

      - name: Upload to Aliyun OSS
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          # 上传到 /releases/clawbox/<version>/ 目录
          ossutil cp -rf upload/ oss://${{ secrets.OSS_BUCKET }}/releases/clawbox/${VERSION}/
          # 清空 latest 目录，确保不残留旧版本文件
          ossutil rm -rf oss://${{ secrets.OSS_BUCKET }}/releases/clawbox/latest/
          # 上传当前版本到 latest
          ossutil cp -rf upload/ oss://${{ secrets.OSS_BUCKET }}/releases/clawbox/latest/
